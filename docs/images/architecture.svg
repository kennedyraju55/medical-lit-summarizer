<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="archAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="ollamaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <filter id="archGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto" fill="#ff6b35">
      <polygon points="0 0, 10 3.5, 0 7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" rx="12" fill="url(#archBg)"/>
  <rect x="1" y="1" width="798" height="398" rx="11" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="700" fill="#ffffff">System Architecture</text>
  <rect x="280" y="42" width="240" height="2" rx="1" fill="url(#archAccent)" opacity="0.5"/>

  <!-- ============ STAGE 1: Research Paper ============ -->
  <g transform="translate(75, 150)" filter="url(#cardShadow)">
    <rect x="-60" y="-55" width="120" height="110" rx="10" fill="#1c2333"/>
    <rect x="-60" y="-55" width="120" height="110" rx="10" fill="none" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>
    <!-- Paper icon -->
    <g transform="translate(0, -20)">
      <rect x="-16" y="-20" width="32" height="40" rx="3" fill="none" stroke="#8b949e" stroke-width="1.5"/>
      <line x1="-9" y1="-10" x2="9" y2="-10" stroke="#8b949e" stroke-width="1" opacity="0.6"/>
      <line x1="-9" y1="-3" x2="9" y2="-3" stroke="#8b949e" stroke-width="1" opacity="0.6"/>
      <line x1="-9" y1="4" x2="9" y2="4" stroke="#8b949e" stroke-width="1" opacity="0.6"/>
      <line x1="-9" y1="11" x2="4" y2="11" stroke="#8b949e" stroke-width="1" opacity="0.6"/>
      <!-- Folded corner -->
      <path d="M7,-20 L16,-20 L16,-11 Z" fill="#1c2333" stroke="#8b949e" stroke-width="1"/>
    </g>
    <text x="0" y="38" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#ffffff">Research Paper</text>
    <text x="0" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#8b949e">PDF / Text Input</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="140" y1="150" x2="195" y2="150" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.8"/>

  <!-- ============ STAGE 2: Section Extraction ============ -->
  <g transform="translate(255, 150)" filter="url(#cardShadow)">
    <rect x="-55" y="-55" width="110" height="110" rx="10" fill="#1c2333"/>
    <rect x="-55" y="-55" width="110" height="110" rx="10" fill="none" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>
    <!-- Extraction icon — magnifier + sections -->
    <g transform="translate(0, -18)">
      <circle cx="-4" cy="-4" r="14" fill="none" stroke="#ff6b35" stroke-width="1.5" opacity="0.7"/>
      <line x1="6" y1="6" x2="16" y2="16" stroke="#ff6b35" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
      <line x1="-10" y1="-6" x2="2" y2="-6" stroke="#8b949e" stroke-width="1" opacity="0.5"/>
      <line x1="-10" y1="0" x2="2" y2="0" stroke="#8b949e" stroke-width="1" opacity="0.5"/>
      <line x1="-10" y1="6" x2="-2" y2="6" stroke="#8b949e" stroke-width="1" opacity="0.5"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Section</text>
    <text x="0" y="49" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Extraction</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="315" y1="150" x2="370" y2="150" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.8"/>

  <!-- ============ STAGE 3: Gemma 4 via Ollama (Central Hub) ============ -->
  <g transform="translate(490, 150)" filter="url(#cardShadow)">
    <rect x="-105" y="-88" width="210" height="176" rx="12" fill="url(#ollamaGrad)"/>
    <rect x="-105" y="-88" width="210" height="176" rx="12" fill="none" stroke="#ff6b35" stroke-width="1.8" opacity="0.7"/>

    <!-- Header bar -->
    <rect x="-105" y="-88" width="210" height="30" rx="12" fill="#ff6b35" opacity="0.12"/>
    <text x="0" y="-67" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" fill="#ff6b35">Gemma 4 via Ollama</text>

    <!-- 4 capability boxes in 2x2 grid -->
    <!-- Row 1 -->
    <g transform="translate(-50, -30)">
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="#21262d"/>
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c9d1d9">8-Section</text>
      <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#8b949e">Analysis</text>
    </g>
    <g transform="translate(50, -30)">
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="#21262d"/>
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c9d1d9">PICO</text>
      <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#8b949e">Framework</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(-50, 20)">
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="#21262d"/>
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c9d1d9">Evidence</text>
      <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#8b949e">Rating</text>
    </g>
    <g transform="translate(50, 20)">
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="#21262d"/>
      <rect x="-42" y="-14" width="84" height="28" rx="6" fill="none" stroke="#30363d" stroke-width="0.8"/>
      <text x="0" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#c9d1d9">Citation</text>
      <text x="0" y="14" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#8b949e">Format</text>
    </g>

    <!-- Local processing indicator -->
    <g transform="translate(0, 65)">
      <rect x="-40" y="-9" width="80" height="18" rx="9" fill="#238636" opacity="0.2"/>
      <circle cx="-28" cy="0" r="3" fill="#3fb950"/>
      <text x="4" y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#3fb950">Local Only</text>
    </g>
  </g>

  <!-- Arrow 3 -->
  <line x1="600" y1="150" x2="655" y2="150" stroke="#ff6b35" stroke-width="2" marker-end="url(#arrowhead)" opacity="0.8"/>

  <!-- ============ STAGE 4: Structured Medical Report ============ -->
  <g transform="translate(725, 150)" filter="url(#cardShadow)">
    <rect x="-60" y="-55" width="120" height="110" rx="10" fill="#1c2333"/>
    <rect x="-60" y="-55" width="120" height="110" rx="10" fill="none" stroke="#ff6b35" stroke-width="1.2" opacity="0.6"/>
    <!-- Report icon -->
    <g transform="translate(0, -18)">
      <rect x="-18" y="-20" width="36" height="42" rx="3" fill="none" stroke="#3fb950" stroke-width="1.5"/>
      <circle cx="-8" cy="-10" r="3" fill="#ff6b35" opacity="0.6"/>
      <line x1="-2" y1="-10" x2="12" y2="-10" stroke="#8b949e" stroke-width="1"/>
      <circle cx="-8" cy="-1" r="3" fill="#ff6b35" opacity="0.6"/>
      <line x1="-2" y1="-1" x2="12" y2="-1" stroke="#8b949e" stroke-width="1"/>
      <circle cx="-8" cy="8" r="3" fill="#ff6b35" opacity="0.6"/>
      <line x1="-2" y1="8" x2="12" y2="8" stroke="#8b949e" stroke-width="1"/>
      <polyline points="-9,-11 -7,-9 -5,-12" fill="none" stroke="#3fb950" stroke-width="1" stroke-linecap="round"/>
      <polyline points="-9,-2 -7,0 -5,-3" fill="none" stroke="#3fb950" stroke-width="1" stroke-linecap="round"/>
      <polyline points="-9,7 -7,9 -5,6" fill="none" stroke="#3fb950" stroke-width="1" stroke-linecap="round"/>
    </g>
    <text x="0" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Structured</text>
    <text x="0" y="49" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff">Medical Report</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(0, 290)">
    <text x="75" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#484f58">INPUT</text>
    <text x="255" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#484f58">PARSE</text>
    <text x="490" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#484f58">ANALYZE</text>
    <text x="725" y="0" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#484f58">OUTPUT</text>
  </g>

  <!-- Data flow labels on arrows -->
  <text x="167" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#484f58">Raw Text</text>
  <text x="342" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#484f58">Sections</text>
  <text x="627" y="140" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#484f58">Results</text>

  <!-- Pipeline detail — bottom info bar -->
  <g transform="translate(400, 360)">
    <rect x="-300" y="-16" width="600" height="32" rx="8" fill="#21262d" opacity="0.6"/>
    <text x="-250" y="3" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">
      <tspan fill="#ff6b35" font-weight="600">extract_section()</tspan> &#x2192;
      <tspan fill="#ff6b35" font-weight="600"> summarize_paper()</tspan> &#x2192;
      <tspan fill="#ff6b35" font-weight="600"> extract_pico()</tspan> &#x2192;
      <tspan fill="#ff6b35" font-weight="600"> rate_evidence_quality()</tspan> &#x2192;
      <tspan fill="#ff6b35" font-weight="600"> format_citation()</tspan>
    </text>
  </g>
</svg>
